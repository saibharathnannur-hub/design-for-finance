<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Stock Graph (React Standalone)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .grid-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        .baseline {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(148, 163, 184, 0.5);
            box-shadow: 0 0 10px rgba(148, 163, 184, 0.5);
            z-index: 2;
        }

        .stats-container {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3rem;
            font-weight: 800;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            padding: 15px 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            transition: color 0.3s ease;
        }

        .stats-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            margin-bottom: 5px;
        }

        #instruction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #94a3b8;
            letter-spacing: 1px;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        #bars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 3;
        }

        .bar-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
            padding: 0 2px;
            box-sizing: border-box;
        }

        .bar {
            position: absolute;
            left: 2px;
            width: calc(100% - 4px);
            border-radius: 4px;
            opacity: 0.9;
            transition: background 0.2s, box-shadow 0.2s; 
        }

        #bars-container.resetting .bar {
            transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.6s;
        }

        .bar.positive {
            bottom: 50%;
            background: linear-gradient(180deg, #34d399 0%, #059669 100%);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            border: 1px solid #6ee7b7;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
        }

        .bar.negative {
            top: 50%;
            background: linear-gradient(180deg, #be123c 0%, #fb7185 100%);
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
            border: 1px solid #f43f5e;
            border-top: none;
            border-radius: 0 0 4px 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const NUM_BARS = 120;

        function App() {
            const [netTotal, setNetTotal] = useState(0);
            const barsRef = useRef(new Array(NUM_BARS).fill(null));
            const barValues = useRef(new Array(NUM_BARS).fill(0));
            const interacted = useRef(false);
            const containerRef = useRef(null);
            const lastPos = useRef({ x: null, y: null });
            const timeoutId = useRef(null);
            const [showInstruction, setShowInstruction] = useState(true);

            const updateNetValue = () => {
                const total = barValues.current.reduce((sum, val) => sum + val, 0);
                setNetTotal(total);
            };

            const setBarValue = (index, value) => {
                barValues.current[index] = value;
                const bar = barsRef.current[index];
                if (bar) {
                    const absDiff = Math.abs(value);
                    bar.style.height = `${absDiff}px`;
                    if (value >= 0) {
                        bar.classList.add('positive');
                        bar.classList.remove('negative');
                    } else {
                        bar.classList.add('negative');
                        bar.classList.remove('positive');
                    }
                }
            };

            const resetBars = () => {
                if (containerRef.current) {
                    containerRef.current.classList.add('resetting');
                }
                for (let i = 0; i < NUM_BARS; i++) {
                    barValues.current[i] = 0;
                    if (barsRef.current[i]) {
                        barsRef.current[i].style.height = '0px';
                    }
                }
                updateNetValue();
                lastPos.current = { x: null, y: null };
            };

            const resetTimer = () => {
                clearTimeout(timeoutId.current);
                timeoutId.current = setTimeout(() => {
                    resetBars();
                }, 2000);
            };

            const handleMouseMove = (e) => {
                if (!interacted.current) {
                    setShowInstruction(false);
                    interacted.current = true;
                }

                if (containerRef.current) {
                    containerRef.current.classList.remove('resetting');
                }

                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                const baselineY = windowHeight / 2;

                const currentX = e.clientX;
                const currentY = e.clientY;

                const lastX = lastPos.current.x;
                const lastY = lastPos.current.y;

                if (lastX !== null && lastY !== null) {
                    const steps = Math.max(1, Math.abs(currentX - lastX) / 2);
                    for (let i = 0; i <= steps; i++) {
                        const interpX = lastX + (currentX - lastX) * (i / steps);
                        const interpY = lastY + (currentY - lastY) * (i / steps);

                        const barIndex = Math.floor((interpX / windowWidth) * NUM_BARS);
                        if (barIndex >= 0 && barIndex < NUM_BARS) {
                            const pixelDiff = baselineY - interpY;
                            setBarValue(barIndex, pixelDiff);
                        }
                    }
                } else {
                    const barIndex = Math.floor((currentX / windowWidth) * NUM_BARS);
                    if (barIndex >= 0 && barIndex < NUM_BARS) {
                        const pixelDiff = baselineY - currentY;
                        setBarValue(barIndex, pixelDiff);
                    }
                }

                lastPos.current = { x: currentX, y: currentY };
                updateNetValue();
                resetTimer();
            };

            const handleMouseLeave = () => {
                lastPos.current = { x: null, y: null };
            };

            useEffect(() => {
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseleave', handleMouseLeave);
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseleave', handleMouseLeave);
                    clearTimeout(timeoutId.current);
                };
            }, []);

            const sign = netTotal >= 0 ? '+' : '-';
            const displayValue = Math.abs(Math.round(netTotal * 5));

            return (
                <div className="app">
                    <div className="grid-background"></div>
                    <div className="baseline"></div>

                    <div className="stats-container" style={{ color: netTotal >= 0 ? '#34d399' : '#fb7185' }}>
                        <div className="stats-label">Net P&L</div>
                        <div>{sign}${displayValue.toLocaleString()}</div>
                    </div>

                    <div id="bars-container" ref={containerRef}>
                        {Array.from({ length: NUM_BARS }).map((_, i) => (
                            <div key={i} className="bar-wrapper">
                                <div
                                    className="bar"
                                    ref={(el) => (barsRef.current[i] = el)}
                                    style={{ height: '0px' }}
                                ></div>
                            </div>
                        ))}
                    </div>

                    {showInstruction && (
                        <div id="instruction">Move your cursor to draw the market</div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
