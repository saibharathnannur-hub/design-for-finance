        // --- Original Interactive Graph adapted as Hero Transition Section ---
        function HeroTransitionSection() {
            const canvasRef = useRef(null);
            const [netTotal, setNetTotal] = useState(0);
            const valuesRef = useRef(new Array(NUM_BARS).fill(0));
            const timerRef = useRef(null);
            const animRef = useRef(null);
            const lastPosRef = useRef({ x: null, y: null });
            
            const staticNoise = useMemo(() => Array.from({length: NUM_BARS}, () => Math.random() * 0.3 + 0.85), []);
            
            const isDrawingRef = useRef(false);
            const zigZagRef = useRef(null);
            const hasCrossedRef = useRef(false);
            const [interacted, setInteracted] = useState(false);

            const draw = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const baseline = height / 2;
                const barWidth = width / NUM_BARS;

                ctx.clearRect(0, 0, width, height);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let x = 0; x <= width; x += 80) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
                for (let y = 0; y <= height; y += 80) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, baseline); ctx.lineTo(width, baseline);
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(107, 203, 222, 0.7)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < NUM_BARS; i++) {
                    let sum = 0, count = 0;
                    for (let j = Math.max(0, i - 5); j <= i; j++) { sum += valuesRef.current[j]; count++; }
                    const y = baseline - (sum / count);
                    const x = i * barWidth + barWidth/2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(160, 165, 176, 0.4)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < NUM_BARS; i++) {
                    let sum = 0, count = 0;
                    for (let j = Math.max(0, i - 15); j <= i; j++) { sum += valuesRef.current[j]; count++; }
                    const y = baseline - (sum / count);
                    const x = i * barWidth + barWidth/2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                const MIN_BODY = 2; 

                for (let i = 0; i < NUM_BARS; i++) {
                    const closeVal = valuesRef.current[i];
                    const openVal = i > 0 ? valuesRef.current[i-1] : closeVal;
                    
                    if (Math.abs(closeVal) < 0.5 && Math.abs(openVal) < 0.5) continue;
                    
                    const x = i * barWidth;
                    const bodyWidth = Math.max(2, barWidth * 0.5); 
                    const bodyX = x + (barWidth - bodyWidth) / 2;

                    const isGreen = closeVal >= openVal;
                    const color = isGreen ? '#52B974' : '#E24B46';
                    
                    const yOpen = baseline - openVal;
                    const yClose = baseline - closeVal;
                    
                    const topY = Math.min(yOpen, yClose);
                    const bottomY = Math.max(yOpen, yClose);
                    const bodyHeight = Math.max(MIN_BODY, bottomY - topY);

                    const noiseVal = staticNoise[i]; 
                    const wickTopExtension = (noiseVal * 40) % 20;
                    const wickBottomExtension = (noiseVal * 80) % 20;

                    const wickHigh = topY - wickTopExtension;
                    const wickLow = bottomY + wickBottomExtension;

                    ctx.strokeStyle = color;
                    ctx.lineWidth = Math.max(1, bodyWidth * 0.15);
                    ctx.beginPath();
                    ctx.moveTo(x + barWidth/2, wickHigh); ctx.lineTo(x + barWidth/2, wickLow);
                    ctx.stroke();

                    ctx.fillStyle = color;
                    ctx.fillRect(bodyX, topY, bodyWidth, bodyHeight);
                }
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const updateSize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    draw();
                };
                window.addEventListener('resize', updateSize);
                updateSize();
                return () => window.removeEventListener('resize', updateSize);
            }, []);

            const handleMouseMove = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const baseline = canvas.height / 2;
                const targetY = baseline - mouseY;

                if (!hasCrossedRef.current) {
                    if (lastPosRef.current.y !== null) {
                        const lastTargetY = baseline - lastPosRef.current.y;
                        if ((lastTargetY > 0 && targetY <= 0) || (lastTargetY < 0 && targetY >= 0)) {
                            hasCrossedRef.current = true;
                        }
                    }
                    if (!hasCrossedRef.current) {
                        lastPosRef.current = { x: mouseX, y: mouseY };
                        return;
                    }
                }

                if (!interacted) setInteracted(true);

                if (animRef.current) { clearInterval(animRef.current); animRef.current = null; }

                if (!isDrawingRef.current) {
                    isDrawingRef.current = true;
                    zigZagRef.current = { anchors: [{ x: mouseX, y: targetY }], currentPeak: { x: mouseX, y: targetY }, isLookingForHigh: targetY >= 0 };
                    lastPosRef.current = { x: mouseX, y: mouseY };
                    return;
                }

                const lastX = lastPosRef.current.x;

                if (lastX !== null && mouseX < lastX) { lastPosRef.current = { x: mouseX, y: mouseY }; return; }

                let zz = zigZagRef.current;
                let lastAnchor = zz.anchors[zz.anchors.length - 1];
                const THRESHOLD = (canvas.height / 2) * 0.08; 

                if (zz.isLookingForHigh) {
                    if (targetY > zz.currentPeak.y) zz.currentPeak = { x: mouseX, y: targetY };
                    else if (zz.currentPeak.y - targetY > THRESHOLD) {
                        zz.anchors.push(zz.currentPeak); lastAnchor = zz.currentPeak; zz.isLookingForHigh = false; zz.currentPeak = { x: mouseX, y: targetY };
                    }
                } else {
                    if (targetY < zz.currentPeak.y) zz.currentPeak = { x: mouseX, y: targetY };
                    else if (targetY - zz.currentPeak.y > THRESHOLD) {
                        zz.anchors.push(zz.currentPeak); lastAnchor = zz.currentPeak; zz.isLookingForHigh = true; zz.currentPeak = { x: mouseX, y: targetY };
                    }
                }

                const drawSegment = (start, end) => {
                    const startBar = Math.max(0, Math.floor((start.x / canvas.width) * NUM_BARS));
                    const endBar = Math.min(NUM_BARS - 1, Math.floor((end.x / canvas.width) * NUM_BARS));
                    if (endBar >= startBar) {
                        for (let i = startBar; i <= endBar; i++) {
                            const p = startBar === endBar ? 1 : (i - startBar) / (endBar - startBar);
                            const exactY = start.y + (end.y - start.y) * p;
                            if (Math.abs(exactY) > 2) valuesRef.current[i] = exactY * staticNoise[i];
                            else valuesRef.current[i] = exactY;
                        }
                    }
                };

                drawSegment(lastAnchor, zz.currentPeak);
                drawSegment(zz.currentPeak, { x: mouseX, y: targetY });

                lastPosRef.current = { x: mouseX, y: mouseY };
                
                const total = valuesRef.current.reduce((sum, val) => sum + val, 0);
                setNetTotal(total);
                draw();

                clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => {
                    animRef.current = setInterval(() => {
                        let allZero = true;
                        for (let i = 0; i < NUM_BARS; i++) {
                            if (Math.abs(valuesRef.current[i]) < 1) valuesRef.current[i] = 0;
                            else { valuesRef.current[i] *= 0.92; allZero = false; }
                        }
                        const newTotal = valuesRef.current.reduce((sum, val) => sum + val, 0);
                        setNetTotal(newTotal); draw();
                        if (allZero) { clearInterval(animRef.current); animRef.current = null; isDrawingRef.current = false; zigZagRef.current = null; setInteracted(false); hasCrossedRef.current = false; }
                    }, 16);
                }, 800); 
            };

            const handleMouseLeave = () => lastPosRef.current = { x: null, y: null };

            const sign = netTotal >= 0 ? '+' : '-';
            const displayValue = Math.abs(Math.round(netTotal * 5));
            const color = netTotal >= 0 ? '#52B974' : '#E24B46';

            return (
                <div style={{ width: '100vw', height: '100vh', position: 'relative', overflow: 'hidden', backgroundColor: '#000' }}>
                    {/* Faint World Map Background */}
                    <div className="map-bg" />
                    
                    {/* Logo that fades when drawn on */}
                    <div className="logo-container" style={{ opacity: 1, transition: 'opacity 0.5s' }}>
                        <div className="logo-text">Walford OS</div>
                    </div>

                    {/* Base Interactive Canvas */}
                    <canvas 
                        ref={canvasRef}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={handleMouseLeave}
                        style={{
                            display: 'block',
                            position: 'absolute',
                            top: 0,
                            left: 0,
                            width: '100%',
                            height: '100%',
                            cursor: 'crosshair',
                            zIndex: 1,
                        }}
                    />

                    {/* UI Overlay Elements */}
                    <div style={{ pointerEvents: 'none' }}>
                        <div className="top-nav" style={{ pointerEvents: 'auto' }}>
                            <div className="nav-links">
                                <a>Terminal</a>
                                <a>Research</a>
                                <a>Risk</a>
                                <a>Portfolios</a>
                                <a>Markets</a>
                            </div>
                            <button className="nav-btn">Request Access</button>
                        </div>

                        <div className="stats">
                            <div className="stats-label">Live Global P&L</div>
                            <div className="stats-value" style={{color}}>
                                {sign}{displayValue.toLocaleString()}
                            </div>
                        </div>

                        <div className="instruction" style={{ opacity: 1 }}>
                            Draw anywhere to simulate market data
                        </div>
                    </div>
                </div>
            );
        }

        // --- Main App Composer ---
        function AboutUsSection() {
            const [progress, setProgress] = React.useState(0);
            const [unlocked, setUnlocked] = React.useState(false);
            const [hoveredPanel, setHoveredPanel] = React.useState(null);
            
            // Generate a realistic-looking stock chart path once
            // Starts at x=35 (after "ABOUT US >>>") and goes to x=90
            const graphPoints = React.useMemo(() => {
                let pts = [];
                let currentY = 50;
                let trend = -0.5; // Overall upward trend (lower Y is higher visually)
                for(let i=35; i<=90; i+=0.5) {
                    pts.push({ x: i, y: currentY });
                    // Random walk with momentum
                    let change = (Math.random() - 0.5) * 3 + trend;
                    if (currentY < 30) trend += 0.3; // resistance
                    if (currentY > 70) trend -= 0.3; // support
                    
                    // Add some sharp moves
                    if (i === 50) change = -10; // jump
                    if (i === 65) change = 8;  // dip
                    if (i === 80) change = -15; // huge jump to form the peak
                    
                    currentY += change;
                    currentY = Math.max(20, Math.min(80, currentY));
                }
                // Force the final point to be a nice peak
                pts[pts.length-1].y = 25; 
                return pts;
            }, []);

            const handleMouseMove = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                let p = x / rect.width;
                p = Math.max(0, Math.min(1, p));
                setProgress(p);
                
                if (p > 0.85 && !unlocked) {
                    setUnlocked(true);
                }
            };

            // Calculate which points to show based on progress
            // We map progress (0 to 1) to the points array
            // If progress is < 0.35, we don't show any graph.
            // If progress > 0.35, we start showing the graph points.
            const graphStartProgress = 0.35;
            let visibleCount = 0;
            if (progress > graphStartProgress) {
                const normalizedProgress = (progress - graphStartProgress) / (1 - graphStartProgress);
                visibleCount = Math.max(1, Math.floor(normalizedProgress * graphPoints.length));
            }
            
            const activePoints = graphPoints.slice(0, visibleCount);
            
            let tipX = 0;
            let tipY = 0;
            if (activePoints.length > 0) {
                tipX = activePoints[activePoints.length - 1].x;
                tipY = activePoints[activePoints.length - 1].y;
            }

            const activeGraphPointsString = activePoints.map(p => `${p.x},${p.y}`).join(' ');
            
            // The text 'ABOUT US' starts on the left and is always visible
            const textOpacity = 1;
            const textX = 10; // Fixed position
            
            return (
                <div style={{ position: 'relative', width: '100%', minHeight: '100vh', backgroundColor: '#000' }}>
                    
                    {/* TOP SECTION: 100vh interactive area */}
                    <div 
                        onMouseMove={handleMouseMove}
                        style={{ 
                            width: '100vw', 
                            height: '100vh', 
                            position: 'sticky', 
                            top: 0,
                            overflow: 'hidden', 
                            cursor: 'ew-resize', // Indicate horizontal movement
                            zIndex: 10
                        }}
                    >
                        {/* Background faint grid lines */}
                        <div style={{ position: 'absolute', top: '50%', left: 0, width: '100%', height: '1px', backgroundColor: 'rgba(255,255,255,0.05)' }} />
                        <div style={{ position: 'absolute', top: 0, left: '20%', width: '1px', height: '100%', backgroundColor: 'rgba(255,255,255,0.03)' }} />
                        <div style={{ position: 'absolute', top: 0, left: '50%', width: '1px', height: '100%', backgroundColor: 'rgba(255,255,255,0.03)' }} />
                        <div style={{ position: 'absolute', top: 0, left: '80%', width: '1px', height: '100%', backgroundColor: 'rgba(255,255,255,0.03)' }} />

                        {/* ABOUT US TEXT */}
                        <div style={{
                            position: 'absolute',
                            top: '40%',
                            left: `${textX}%`,
                            transform: 'translateY(-50%)',
                            opacity: textOpacity,
                            display: 'flex',
                            alignItems: 'center',
                            gap: '20px',
                            zIndex: 10,
                            pointerEvents: 'none',
                        }}>
                            <h1 style={{ fontSize: '6rem', fontWeight: 'bold', margin: 0, letterSpacing: '-2px', color: '#fff' }}>ABOUT US</h1>
                            <div style={{ color: '#52B974', fontSize: '2rem', fontWeight: 'bold', letterSpacing: '-1px' }}>&gt;&gt;&gt;</div>
                        </div>
                        
                        {/* Secondary Text under ABOUT US */}
                        <div style={{
                            position: 'absolute',
                            top: '55%',
                            left: `${textX}%`,
                            opacity: 1,
                            color: '#A0A5B0',
                            fontSize: '1.2rem',
                            maxWidth: '400px',
                            lineHeight: '1.6',
                            zIndex: 10,
                            pointerEvents: 'none',
                        }}>
                            We are building the future of financial intelligence. Moving markets requires precision, speed, and absolute clarity.
                        </div>

                        {/* Growing SVG Graph */}
                        <div style={{ 
                            position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', 
                            pointerEvents: 'none', zIndex: 5
                        }}>
                            <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: '100%', height: '100%' }}>
                                <g>
                                    {/* Outer Glow */}
                                    <polyline 
                                        points={activeGraphPointsString} 
                                        fill="none" 
                                        stroke="#52B974" 
                                        strokeWidth="0.5"
                                        opacity="0.2"
                                        filter="blur(2px)"
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                    
                                    {/* Main Sharp Line */}
                                    <polyline 
                                        points={activeGraphPointsString} 
                                        fill="none" 
                                        stroke="#52B974" 
                                        strokeWidth="0.3"
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                </g>
                            </svg>

                            {/* Glowing Tip Pointer */}
                            {activePoints.length > 0 && (
                                <div style={{
                                    position: 'absolute',
                                    left: `${tipX}%`,
                                    top: `${tipY}%`,
                                    width: '6px',
                                    height: '6px',
                                    backgroundColor: '#FFF',
                                    borderRadius: '50%',
                                    transform: 'translate(-50%, -50%)',
                                    boxShadow: '0 0 20px 8px rgba(82, 185, 116, 0.6), 0 0 10px 4px rgba(82, 185, 116, 0.9)',
                                    zIndex: 10
                                }} />
                            )}
                        </div>
                        
                        {/* Instruction at the bottom */}
                        <div style={{
                            position: 'absolute',
                            bottom: '40px',
                            left: '50%',
                            transform: 'translateX(-50%)',
                            color: 'rgba(255,255,255,0.4)',
                            fontSize: '0.9rem',
                            letterSpacing: '2px',
                            pointerEvents: 'none',
                            textTransform: 'uppercase',
                            opacity: unlocked ? 0 : 1,
                            transition: 'opacity 0.5s'
                        }}>
                            Move cursor right to explore &rarr;
                        </div>

                        {/* Scroll down indicator once unlocked */}
                        <div style={{
                            position: 'absolute',
                            bottom: '40px',
                            left: '50%',
                            transform: 'translateX(-50%)',
                            color: '#52B974',
                            fontSize: '0.9rem',
                            letterSpacing: '2px',
                            pointerEvents: 'none',
                            textTransform: 'uppercase',
                            opacity: unlocked ? 1 : 0,
                            transition: 'opacity 0.5s',
                            display: 'flex',
                            flexDirection: 'column',
                            alignItems: 'center',
                            gap: '10px'
                        }}>
                            <span>Scroll Down</span>
                            <span style={{ fontSize: '1.5rem', animation: 'bounce 2s infinite' }}>&darr;</span>
                        </div>
                    </div>
                    
                    {/* BOTTOM SECTION: Unlocked Content */}
                    <div style={{ 
                        position: 'relative', 
                        width: '100%', 
                        zIndex: 20, 
                        backgroundColor: '#000',
                        opacity: unlocked ? 1 : 0,
                        transform: unlocked ? 'translateY(0)' : 'translateY(50px)',
                        transition: 'opacity 1s ease-out, transform 1s ease-out',
                        padding: '150px 5%',
                        display: unlocked ? 'block' : 'none' // Prevent scrolling before unlock
                    }}>
                        {/* Text Block */}
                        <div style={{ textAlign: 'center', marginBottom: '100px' }}>
                            <div style={{ color: '#52B974', fontSize: '14px', letterSpacing: '4px', textTransform: 'uppercase', marginBottom: '30px', fontWeight: 600 }}>Built for Professionals</div>
                            <h2 style={{ fontSize: '5rem', fontWeight: 'bold', lineHeight: '1.1', color: 'white', margin: '0 0 40px 0', letterSpacing: '-1px' }}>
                                Every tool you need.<br/>
                                <span style={{ color: '#A0A5B0' }}>One unified workspace.</span>
                            </h2>
                            <p style={{ color: '#A0A5B0', fontSize: '1.4rem', maxWidth: '800px', margin: '0 auto', lineHeight: '1.6' }}>
                                From portfolio tracking to quantitative research — everything your team needs in one place.
                            </p>
                        </div>

                        {/* Images Stack - Accordion Layout */}
                        <div 
                            style={{ 
                                display: 'flex', 
                                flexDirection: 'row', 
                                justifyContent: 'center', 
                                alignItems: 'center', 
                                gap: '20px', 
                                width: '100%', 
                                maxWidth: '1400px', 
                                margin: '0 auto',
                                height: '500px'
                            }}
                            onMouseLeave={() => setHoveredPanel(null)}
                        >
                            {[
                                { src: './portfolio.jpeg', alt: 'Portfolio Analysis', label: 'PORTFOLIO ANALYSIS' },
                                { src: './system.jpeg', alt: 'System Overview', label: 'SYSTEM OVERVIEW' },
                                { src: './quant.jpeg', alt: 'Quantitative Research', label: 'QUANTITATIVE RESEARCH' }
                            ].map((img, idx) => {
                                const isActive = hoveredPanel === idx;
                                return (
                                    <div 
                                        key={idx}
                                        onMouseEnter={() => setHoveredPanel(idx)}
                                        style={{
                                            position: 'relative',
                                            height: '100%',
                                            flex: isActive ? '4' : '1',
                                            transition: 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)',
                                            borderRadius: '16px',
                                            overflow: 'hidden',
                                            border: '1px solid #1a222c',
                                            opacity: hoveredPanel === null ? 0.7 : (isActive ? 1 : 0.3),
                                            boxShadow: isActive ? '0 20px 50px rgba(0,0,0,0.8)' : 'none',
                                            cursor: 'pointer',
                                            backgroundColor: '#0B111A'
                                        }}
                                    >
                                        <img 
                                            src={img.src} 
                                            alt={img.alt} 
                                            style={{ 
                                                width: '100%', 
                                                height: '100%', 
                                                objectFit: 'cover', 
                                                objectPosition: 'left top',
                                                display: 'block' 
                                            }} 
                                        />
                                        <div style={{
                                            position: 'absolute',
                                            bottom: 0, left: 0, right: 0,
                                            padding: '30px',
                                            background: 'linear-gradient(to top, rgba(0,0,0,0.9), transparent)',
                                            opacity: isActive ? 1 : 0,
                                            transition: 'opacity 0.5s',
                                            display: 'flex',
                                            alignItems: 'flex-end',
                                            pointerEvents: 'none'
                                        }}>
                                            <h3 style={{ margin: 0, color: '#fff', fontSize: '1.5rem', letterSpacing: '2px' }}>{img.label}</h3>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div style={{ textAlign: 'center', marginTop: '40px', color: '#666', fontSize: '0.9rem', letterSpacing: '2px' }}>
                            Click any panel to focus
                        </div>
                    </div>
                </div>
            );
        }
function App() {
            return (
                <div style={{ backgroundColor: '#000', fontFamily: 'Inter, sans-serif' }}>
                    <HeroTransitionSection />
                    <AboutUsSection />
                    <ScrollTransitionSection />
                    <FooterBlocks />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
