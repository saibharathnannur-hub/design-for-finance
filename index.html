        // --- Transition Engine (Split-Screen Slider) ---
        
        function HeroTransitionSection() {
            const canvasRef = useRef(null);
            const [netTotal, setNetTotal] = useState(0);
            const valuesRef = useRef(new Array(NUM_BARS).fill(0));
            const timerRef = useRef(null);
            const animRef = useRef(null);
            const lastPosRef = useRef({ x: null, y: null });
            
            const staticNoise = useMemo(() => Array.from({length: NUM_BARS}, () => Math.random() * 0.3 + 0.85), []);
            
            const isDrawingRef = useRef(false);
            const zigZagRef = useRef(null);
            const hasCrossedRef = useRef(false);
            const [interacted, setInteracted] = useState(false);

            const draw = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const baseline = height / 2;
                const barWidth = width / NUM_BARS;

                ctx.clearRect(0, 0, width, height);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let x = 0; x <= width; x += 80) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
                for (let y = 0; y <= height; y += 80) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, baseline); ctx.lineTo(width, baseline);
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(107, 203, 222, 0.7)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < NUM_BARS; i++) {
                    let sum = 0, count = 0;
                    for (let j = Math.max(0, i - 5); j <= i; j++) { sum += valuesRef.current[j]; count++; }
                    const y = baseline - (sum / count);
                    const x = i * barWidth + barWidth/2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(160, 165, 176, 0.4)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < NUM_BARS; i++) {
                    let sum = 0, count = 0;
                    for (let j = Math.max(0, i - 15); j <= i; j++) { sum += valuesRef.current[j]; count++; }
                    const y = baseline - (sum / count);
                    const x = i * barWidth + barWidth/2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                const MIN_BODY = 2; 

                for (let i = 0; i < NUM_BARS; i++) {
                    const closeVal = valuesRef.current[i];
                    const openVal = i > 0 ? valuesRef.current[i-1] : closeVal;
                    
                    if (Math.abs(closeVal) < 0.5 && Math.abs(openVal) < 0.5) continue;
                    
                    const x = i * barWidth;
                    const bodyWidth = Math.max(2, barWidth * 0.5); 
                    const bodyX = x + (barWidth - bodyWidth) / 2;

                    const isGreen = closeVal >= openVal;
                    const color = isGreen ? '#52B974' : '#E24B46';
                    
                    const yOpen = baseline - openVal;
                    const yClose = baseline - closeVal;
                    
                    const topY = Math.min(yOpen, yClose);
                    const bottomY = Math.max(yOpen, yClose);
                    const bodyHeight = Math.max(MIN_BODY, bottomY - topY);

                    const noiseVal = staticNoise[i]; 
                    const wickTopExtension = (noiseVal * 40) % 20;
                    const wickBottomExtension = (noiseVal * 80) % 20;

                    const wickHigh = topY - wickTopExtension;
                    const wickLow = bottomY + wickBottomExtension;

                    ctx.strokeStyle = color;
                    ctx.lineWidth = Math.max(1, bodyWidth * 0.15);
                    ctx.beginPath();
                    ctx.moveTo(x + barWidth/2, wickHigh); ctx.lineTo(x + barWidth/2, wickLow);
                    ctx.stroke();

                    ctx.fillStyle = color;
                    ctx.fillRect(bodyX, topY, bodyWidth, bodyHeight);
                }
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const updateSize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    draw();
                };
                window.addEventListener('resize', updateSize);
                updateSize();
                return () => window.removeEventListener('resize', updateSize);
            }, []);

            const handleMouseMove = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const baseline = canvas.height / 2;
                const targetY = baseline - mouseY;

                if (!hasCrossedRef.current) {
                    if (lastPosRef.current.y !== null) {
                        const lastTargetY = baseline - lastPosRef.current.y;
                        if ((lastTargetY > 0 && targetY <= 0) || (lastTargetY < 0 && targetY >= 0)) {
                            hasCrossedRef.current = true;
                        }
                    }
                    if (!hasCrossedRef.current) {
                        lastPosRef.current = { x: mouseX, y: mouseY };
                        return;
                    }
                }

                if (!interacted) setInteracted(true);

                if (animRef.current) { clearInterval(animRef.current); animRef.current = null; }

                if (!isDrawingRef.current) {
                    isDrawingRef.current = true;
                    zigZagRef.current = { anchors: [{ x: mouseX, y: targetY }], currentPeak: { x: mouseX, y: targetY }, isLookingForHigh: targetY >= 0 };
                    lastPosRef.current = { x: mouseX, y: mouseY };
                    return;
                }

                const lastX = lastPosRef.current.x;

                if (lastX !== null && mouseX < lastX) { lastPosRef.current = { x: mouseX, y: mouseY }; return; }

                let zz = zigZagRef.current;
                let lastAnchor = zz.anchors[zz.anchors.length - 1];
                const THRESHOLD = (canvas.height / 2) * 0.08; 

                if (zz.isLookingForHigh) {
                    if (targetY > zz.currentPeak.y) zz.currentPeak = { x: mouseX, y: targetY };
                    else if (zz.currentPeak.y - targetY > THRESHOLD) {
                        zz.anchors.push(zz.currentPeak); lastAnchor = zz.currentPeak; zz.isLookingForHigh = false; zz.currentPeak = { x: mouseX, y: targetY };
                    }
                } else {
                    if (targetY < zz.currentPeak.y) zz.currentPeak = { x: mouseX, y: targetY };
                    else if (targetY - zz.currentPeak.y > THRESHOLD) {
                        zz.anchors.push(zz.currentPeak); lastAnchor = zz.currentPeak; zz.isLookingForHigh = true; zz.currentPeak = { x: mouseX, y: targetY };
                    }
                }

                const drawSegment = (start, end) => {
                    const startBar = Math.max(0, Math.floor((start.x / canvas.width) * NUM_BARS));
                    const endBar = Math.min(NUM_BARS - 1, Math.floor((end.x / canvas.width) * NUM_BARS));
                    if (endBar >= startBar) {
                        for (let i = startBar; i <= endBar; i++) {
                            const p = startBar === endBar ? 1 : (i - startBar) / (endBar - startBar);
                            const exactY = start.y + (end.y - start.y) * p;
                            if (Math.abs(exactY) > 2) valuesRef.current[i] = exactY * staticNoise[i];
                            else valuesRef.current[i] = exactY;
                        }
                    }
                };

                drawSegment(lastAnchor, zz.currentPeak);
                drawSegment(zz.currentPeak, { x: mouseX, y: targetY });

                lastPosRef.current = { x: mouseX, y: mouseY };
                
                const total = valuesRef.current.reduce((sum, val) => sum + val, 0);
                setNetTotal(total);
                draw();

                clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => {
                    animRef.current = setInterval(() => {
                        let allZero = true;
                        for (let i = 0; i < NUM_BARS; i++) {
                            if (Math.abs(valuesRef.current[i]) < 1) valuesRef.current[i] = 0;
                            else { valuesRef.current[i] *= 0.92; allZero = false; }
                        }
                        const newTotal = valuesRef.current.reduce((sum, val) => sum + val, 0);
                        setNetTotal(newTotal); draw();
                        if (allZero) { clearInterval(animRef.current); animRef.current = null; isDrawingRef.current = false; zigZagRef.current = null; setInteracted(false); hasCrossedRef.current = false; }
                    }, 16);
                }, 800); 
            };

            const handleMouseLeave = () => lastPosRef.current = { x: null, y: null };

            const sign = netTotal >= 0 ? '+' : '-';
            const displayValue = Math.abs(Math.round(netTotal * 5));
            const color = netTotal >= 0 ? '#52B974' : '#E24B46';

            return (
                <div style={{ width: '100vw', height: '100vh', position: 'relative', overflow: 'hidden', backgroundColor: '#000' }}>
                    {/* Faint World Map Background */}
                    <div className="map-bg" />
                    
                    {/* Logo that fades when drawn on */}
                    <div className="logo-container" style={{ opacity: 1, transition: 'opacity 0.5s' }}>
                        <div className="logo-text">Walford OS</div>
                    </div>

                    {/* Base Interactive Canvas */}
                    <canvas 
                        ref={canvasRef}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={handleMouseLeave}
                        style={{
                            display: 'block',
                            position: 'absolute',
                            top: 0,
                            left: 0,
                            width: '100%',
                            height: '100%',
                            cursor: 'crosshair',
                            zIndex: 1,
                        }}
                    />

                    {/* UI Overlay Elements */}
                    <div style={{ pointerEvents: 'none' }}>
                        <div className="top-nav" style={{ pointerEvents: 'auto' }}>
                            <div className="nav-links">
                                <a>Terminal</a>
                                <a>Research</a>
                                <a>Risk</a>
                                <a>Portfolios</a>
                                <a>Markets</a>
                            </div>
                            <button className="nav-btn">Request Access</button>
                        </div>

                        <div className="stats">
                            <div className="stats-label">Live Global P&L</div>
                            <div className="stats-value" style={{color}}>
                                {sign === '+' ? '↑' : '↓'} {sign}{displayValue.toLocaleString()}
                            </div>
                        </div>

                        <div className="instruction" style={{ opacity: 1 }}>
                            Draw anywhere to simulate market data
                        </div>
                    </div>
                </div>
            );
        }

        
        function ScrollTransitionSection() {
            const containerRef = React.useRef(null);

            const [isHovered, setIsHovered] = React.useState(false);
            const [sectionOpacity, setSectionOpacity] = React.useState(0);

            React.useEffect(() => {
                const handleScrollFade = () => {
                    if (!outerRef.current) return;
                    const rect = outerRef.current.getBoundingClientRect();
                    if (rect.top > 0 && rect.top < window.innerHeight) {
                        const scrolledProgress = 1 - (rect.top / window.innerHeight);
                        // Fade from 0.3 to 1.0
                        const opacity = 0.3 + (scrolledProgress * 0.7);
                        setSectionOpacity(Math.min(1, opacity));
                    } else if (rect.top <= 0) {
                        setSectionOpacity(1);
                    } else {
                        setSectionOpacity(0.3);
                    }
                };
                
                let ticking = false;
                const onScroll = () => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            handleScrollFade();
                            ticking = false;
                        });
                        ticking = true;
                    }
                };
                
                window.addEventListener('scroll', onScroll, { passive: true });
                handleScrollFade();
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

                if (!containerRef.current || !topLayerRef.current || !sliderRef.current) return;

        // --- Main App Composer ---
        function AboutUsSection() {
            const containerRef = React.useRef(null);
            const [sectionOpacity, setSectionOpacity] = React.useState(1);
            
            const targetProgressRef = React.useRef(0);
            const [progress, setProgress] = React.useState(0);
            
            const lastMouseRef = React.useRef({ x: null, y: null, time: 0, v: 0 });
            
            const isVisibleRef = React.useRef(false);

            // Visibility observer
            React.useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        isVisibleRef.current = entry.isIntersecting;
                    },
                    { threshold: 0.3 } // 30% visible to trigger
                );
                
                if (containerRef.current) {
                    observer.observe(containerRef.current);
                }
                
                return () => observer.disconnect();
            }, []);

            // Scroll Fade Out Effect
            React.useEffect(() => {
                const handleScrollFade = () => {
                    if (!containerRef.current) return;
                    const rect = containerRef.current.getBoundingClientRect();
                    if (rect.bottom < window.innerHeight) {
                        const scrolledProgress = 1 - (rect.bottom / window.innerHeight);
                        // Fade from 1.0 to 0.4
                        const opacity = 1 - (scrolledProgress * 0.6);
                        setSectionOpacity(Math.max(0.4, opacity));
                    } else {
                        setSectionOpacity(1);
                    }
                };
                
                let ticking = false;
                const onScroll = () => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            handleScrollFade();
                            ticking = false;
                        });
                        ticking = true;
                    }
                };
                
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            // Lerp effect
            React.useEffect(() => {
                let animationFrameId;
                const lerp = () => {
                    setProgress(prev => {
                        let diff = targetProgressRef.current - prev;
                        if (Math.abs(diff) < 0.001) return targetProgressRef.current;
                        return prev + diff * 0.025; 
                    });
                    animationFrameId = requestAnimationFrame(lerp);
                };
                lerp();
                return () => cancelAnimationFrame(animationFrameId);
            }, []);

            // Keyboard navigation effect
            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!isVisibleRef.current) return; // Only work when this section is visible
                    
                    if (e.key === 'ArrowRight') {
                        let prev = targetProgressRef.current;
                        if (prev < 0.2) targetProgressRef.current = 0.333; 
                        else if (prev < 0.45) targetProgressRef.current = 0.555; 
                        else targetProgressRef.current = 0.777; 
                    } else if (e.key === 'ArrowLeft') {
                        let prev = targetProgressRef.current;
                        if (prev > 0.7) targetProgressRef.current = 0.555; 
                        else if (prev > 0.45) targetProgressRef.current = 0.333; 
                        else targetProgressRef.current = 0; 
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const keyPoints = [
                {x: 0, y: 80},
                {x: 10, y: 90, isPeak: true, id: 0}, 
                {x: 15, y: 93},
                {x: 25, y: 80},
                {x: 35, y: 88},
                {x: 45, y: 70},
                {x: 55, y: 82},
                {x: 65, y: 60},
                {x: 75, y: 65, isPeak: true, id: 1}, 
                {x: 78, y: 82}, 
                {x: 88, y: 65},
                {x: 98, y: 78},
                {x: 110, y: 55},
                {x: 118, y: 68},
                {x: 125, y: 35, isPeak: true, id: 2}, 
                {x: 128, y: 60}, 
                {x: 135, y: 45},
                {x: 145, y: 70},
                {x: 155, y: 35},
                {x: 165, y: 55},
                {x: 175, y: 15, isPeak: true, id: 3}, 
                {x: 180, y: 45}, 
                {x: 190, y: 25},
                {x: 200, y: 40},
                {x: 215, y: 10},
                {x: 225, y: 5}
            ];

            const graphPoints = React.useMemo(() => {
                const points = [];
                for (let x = 0; x <= 225; x += 0.5) {
                    let p1 = keyPoints[0];
                    let p2 = keyPoints[keyPoints.length - 1];
                    for (let i = 0; i < keyPoints.length - 1; i++) {
                        if (x >= keyPoints[i].x && x <= keyPoints[i+1].x) {
                            p1 = keyPoints[i];
                            p2 = keyPoints[i+1];
                            break;
                        }
                    }
                    const t = (x - p1.x) / (p2.x - p1.x || 1);
                    const tSmooth = (1 - Math.cos(t * Math.PI)) / 2;
                    const y = p1.y + (p2.y - p1.y) * tSmooth;
                    
                    points.push({ x, y });
                }
                return points;
            }, []);

             const handleMouseMove = (e) => {
                if (!containerRef.current) return;
                
                const now = performance.now();
                const dt = now - lastMouseRef.current.time;
                
                if (lastMouseRef.current.x === null) {
                    lastMouseRef.current = { x: e.clientX, y: e.clientY, time: now, v: 0 };
                    return;
                }

                const dx = e.clientX - lastMouseRef.current.x;
                const dy = e.clientY - lastMouseRef.current.y;
                
                let v = lastMouseRef.current.v;
                if (dt > 0) {
                    const currentV = Math.abs(dx) / dt;
                    v = v * 0.7 + currentV * 0.3;
                }
                
                lastMouseRef.current = { x: e.clientX, y: e.clientY, time: now, v };

                // We use a continuous deadzone formula to prevent micro-jitters 
                if (Math.abs(dx) > 1) {
                    const angleRatio = Math.abs(dx) / (Math.abs(dy) + 1);
                    if (angleRatio > 0.5) {
                        const sensitivity = window.innerWidth * 0.6; 
                        let newPct = targetProgressRef.current + (dx / sensitivity);
                        // Cap at 0.777 so the graph ends at the final text peak and doesn't continue into empty space
                        targetProgressRef.current = Math.max(0, Math.min(0.777, newPct));
                    }
                }
            };

            const handleMouseLeave = () => {
                lastMouseRef.current = { x: null, y: null, time: 0, v: 0 };
            };

            const maxIndex = graphPoints.length - 1; 
            const exactIndex = Math.max(0, progress * maxIndex);
            const floorIndex = Math.floor(exactIndex);
            const ceilIndex = Math.min(maxIndex, Math.ceil(exactIndex));
            const fraction = exactIndex - floorIndex;

            const p1 = graphPoints[floorIndex];
            const p2 = graphPoints[ceilIndex];
            
            let tipX = 0;
            let tipY = 50;
            if (p1 && p2) {
                tipX = p1.x + (p2.x - p1.x) * fraction;
                tipY = p1.y + (p2.y - p1.y) * fraction;
            } else if (p1) {
                tipX = p1.x;
                tipY = p1.y;
            }

            const activePoints = graphPoints.slice(0, floorIndex + 1);
            const activeGraphPointsString = activePoints.map(p => `${p.x},${p.y}`).join(' ') + ` ${tipX},${tipY}`;

            const camTipX = Math.min(175, tipX);
            let camTipY = tipY;
            if (tipX > 175) {
                const exactCamIndex = (175 / 225) * maxIndex;
                const fIndex = Math.floor(exactCamIndex);
                const cIndex = Math.min(maxIndex, Math.ceil(exactCamIndex));
                const frac = exactCamIndex - fIndex;
                const cp1 = graphPoints[fIndex];
                const cp2 = graphPoints[cIndex];
                if (cp1 && cp2) {
                    camTipY = cp1.y + (cp2.y - cp1.y) * frac;
                } else if (cp1) {
                    camTipY = cp1.y;
                }
            }

            let translateX = Math.min(0, 50 - camTipX); 
            let translateY = -(camTipY - 50); 
            
            let zoom = 1;
            const peaks = keyPoints.filter(p => p.isPeak && p.id > 0);
            let closestPeakDist = 1000;
            for (let p of peaks) {
                const dist = Math.abs(camTipX - p.x);
                if (dist < closestPeakDist) closestPeakDist = dist;
            }
            if (closestPeakDist < 30) {
                const zoomFactor = 1 - (closestPeakDist / 30);
                const smoothZoom = zoomFactor * zoomFactor * (3 - 2 * zoomFactor);
                zoom = 1 + (1.5 * smoothZoom); // Increased from 0.85 to 1.5 for much more zoom
            }

            // Map the underlying non-linear progress mathematically to a visually evenly spaced progress bar
            let visualProgress = 0;
            if (progress <= 0.333) {
                visualProgress = (progress / 0.333) * 33.333;
            } else if (progress <= 0.555) {
                visualProgress = 33.333 + ((progress - 0.333) / (0.555 - 0.333)) * 33.333;
            } else {
                visualProgress = 66.666 + ((Math.min(0.777, progress) - 0.555) / (0.777 - 0.555)) * 33.333;
            }

            return (
                <div 
                    ref={containerRef}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    style={{ position: 'relative', width: '100vw', height: '100vh', backgroundColor: '#000', overflow: 'hidden', opacity: sectionOpacity, transition: 'none' }}
                >
                    <div style={{
                        position: 'absolute',
                        top: 0,
                        left: 0,
                        width: '225vw',
                        height: '100vh',
                        transform: `translate(${translateX}vw, ${translateY}vh) scale(${zoom})`,
                        // Shift zoom origin 10% higher to perfectly center the text/image instead of the dot
                        transformOrigin: `${(camTipX/225) * 100}% ${Math.max(0, camTipY - 10)}%`,
                        willChange: 'transform'
                    }}>
                    
                        <div style={{ position: 'absolute', top: '50%', left: 0, width: '100%', height: '1px', backgroundColor: 'rgba(255,255,255,0.05)' }} />
                        {[...Array(10)].map((_, i) => (
                            <div key={i} style={{ position: 'absolute', top: 0, left: `${i * 25}vw`, width: '1px', height: '100%', backgroundColor: 'rgba(255,255,255,0.03)' }} />
                        ))}

                        <div style={{ 
                            position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', 
                            pointerEvents: 'none', zIndex: 5
                        }}>
                            <svg viewBox="0 0 225 100" preserveAspectRatio="none" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
                                <g>
                                    <polyline 
                                        points={activeGraphPointsString} 
                                        fill="none" 
                                        stroke="#52B974" 
                                        strokeWidth="0.5"
                                        opacity="0.2"
                                        filter="blur(2px)"
                                    />
                                    <polyline 
                                        points={activeGraphPointsString} 
                                        fill="none" 
                                        stroke="#52B974" 
                                        strokeWidth="0.3"
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                </g>
                            </svg>

                            {activePoints.length > 0 && (
                                <div style={{ 
                                    position: 'absolute', 
                                    left: `${(tipX / 225) * 100}%`, 
                                    top: `${tipY}%`, 
                                    width: '6px', 
                                    height: '6px', 
                                    backgroundColor: '#FFF',
                                    borderRadius: '50%',
                                    transform: 'translate(-50%, -50%)',
                                    boxShadow: '0 0 20px 8px rgba(82, 185, 116, 0.8), 0 0 8px 3px rgba(82, 185, 116, 1)',
                                    zIndex: 10,
                                    opacity: 1,
                                    transition: 'opacity 0.3s'
                                }} />
                            )}
                        </div>



                        {/* PEAK 1 CONTENT */}
                        <div style={{
                            position: 'absolute',
                            left: `${(75/225)*100}%`,
                            top: `65%`,
                            transform: 'translate(-50%, -100%)', 
                            opacity: tipX > 60 ? Math.min(1, (tipX - 60) / 15) : 0,
                            transition: 'opacity 0.3s',
                            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '15px',
                            zIndex: 20,
                            pointerEvents: 'none'
                        }}>
                            <div style={{ textAlign: 'center' }}>
                                <h2 style={{ color: 'white', fontSize: '2rem', margin: '0 0 5px 0', letterSpacing: '1px' }}>PORTFOLIO ANALYSIS</h2>
                                <p style={{ color: '#A0A5B0', fontSize: '0.9rem', margin: 0, maxWidth: '350px' }}>Institutional asset management tools.</p>

        function GlobalScrollTransition() {
            const [progress, setProgress] = React.useState(0);

            React.useEffect(() => {
                const boundaryMarker = document.getElementById('transition-marker');
                
                const handleScroll = () => {
                    if (!boundaryMarker) return;
                    const rect = boundaryMarker.getBoundingClientRect();
                    const windowHeight = window.innerHeight;
                    
                    // The marker is 150vh tall. We start transition when marker top reaches 50% of screen.
                    const triggerPoint = windowHeight * 0.5;
                    // The transition lasts for 150vh of scroll distance
                    const distance = windowHeight * 1.5;

                    const currentOffset = triggerPoint - rect.top;

                    if (currentOffset > 0 && currentOffset < distance) {
                        setProgress(currentOffset / distance);
                    } else if (currentOffset <= 0) {
                        setProgress(0);
                    } else {
                        setProgress(1);
                    }
                };

                window.addEventListener('scroll', handleScroll);
                handleScroll();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const cols = 5;
            const rows = 4;
            const totalBlocks = cols * rows;

            const blocks = React.useMemo(() => {
                const currencies = ['$', '€', '£', '¥', '₿', '₹', '₽', '₩'];
                return Array.from({ length: totalBlocks }).map((_, i) => ({
                    id: i,
                    currency: currencies[i % currencies.length],
                    entryStart: Math.random() * 0.4, 
                    entryEnd: 0.4 + Math.random() * 0.1, 
                    exitStart: 0.5 + Math.random() * 0.1, 
                    exitEnd: 0.6 + Math.random() * 0.4, 
                    direction: Math.random() > 0.5 ? 1 : -1 
                }));
            }, []);

            if (progress === 0 || progress === 1) return null;

            return (
                <div style={{ position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh', zIndex: 9999, pointerEvents: 'none', display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gridTemplateRows: `repeat(${rows}, 1fr)` }}>
                    {blocks.map(block => {
                        let scaleX = 0;
                        if (progress >= block.entryStart && progress < block.entryEnd) {
                            scaleX = (progress - block.entryStart) / (block.entryEnd - block.entryStart);
                        } else if (progress >= block.entryEnd && progress <= block.exitStart) {
                            scaleX = 1;
                        } else if (progress > block.exitStart && progress <= block.exitEnd) {
                            scaleX = 1 - ((progress - block.exitStart) / (block.exitEnd - block.exitStart));
                        } else {
                            scaleX = 0;
                        }

                        const easeInOut = t => t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                        const easedScale = easeInOut(scaleX);

                        let translateX = 0;
                        let translateY = 0;
                        if (progress < block.entryEnd) {
                            translateX = (1 - easedScale) * 100 * block.direction;
                        } else if (progress > block.exitStart) {
                            translateY = (1 - easedScale) * -100;
                        }

                        return (
                            <div key={block.id} style={{
                                backgroundColor: '#52B974',
                                border: '1px solid #000',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                fontSize: '6vw',
                                fontWeight: '900',
                                color: '#000',
                                transform: `translate(${translateX}vw, ${translateY}vh)`,
                                willChange: 'transform'
                            }}>
                                {block.currency}
                            </div>
                        );
                    })}
                </div>
            );
        }

function App() {
            return (
                <div style={{ backgroundColor: '#000', fontFamily: 'Inter, sans-serif' }}>
                    <GlobalScrollTransition />
                    <HeroTransitionSection />
                    <AboutUsSection />

                    <div id="transition-marker" style={{ height: '150vh', backgroundColor: '#000' }}></div>
                    
                    <ScrollTransitionSection />
                    <FooterBlocks />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
