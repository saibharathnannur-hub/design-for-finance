<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalfordOS Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000000;
            color: #D1D4DC;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #root {
            width: 100%;
        }
        
        /* ------------- HERO SECTION (Interactive Graph) ------------- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        
        .map-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('./world_map_bg.png');
            background-size: 85%; 
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 75%);
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 75%);
        }

        /* ------------- CINEMATIC TRANSITION STYLES ------------- */
        @keyframes scrollGraph {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @keyframes sweepLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @keyframes sweepRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        .bg-graph-animation {
            width: 200%;
            height: 100%;
            animation: scrollGraph 20s linear infinite;
        }
        .currency-symbol {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.15);
            font-weight: bold;
            margin: 0 10px;
        }
        .ticker-bar {position: absolute;
            top: 25%;
            left: 0;
            width: 200vw;
            height: 50%;
            z-index: 1;
            pointer-events: none;
            animation: scrollGraph 12s linear infinite;
        }

        .ticker-bar {
            position: absolute;
            top: 50%;
            left: 0;
            width: max-content;
            display: flex;
            gap: 10px;
            z-index: 20;
            transform: translateY(-50%);
            pointer-events: none;
            will-change: transform;
        }

        .ticker-pill {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #FFF;
            white-space: nowrap;
        }
        
        .ticker-pill-val {
            color: #D1D4DC;
            font-weight: 500;
        }


        .hero-canvas {
            position: absolute;
            top: 0; left: 0;
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 2;
        }
        
        .blur-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.7);
              position: absolute;
              top: 0; left: 0; right: 0; bottom: 0;
              backdrop-filter: blur(12px);
              -webkit-backdrop-filter: blur(12px);
              background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 75%, rgba(0,0,0,1) 100%);
              z-index: 5;
              pointer-events: none;
              /* CSS mask so the blur ALSO cleanly fades out in the center */
              -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,1) 75%);
              mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,1) 75%);
          }

        .center-boundary {
              position: absolute;
              top: 10vh; 
              left: 5vw; 
              width: 90vw; 
              height: 80vh;
              border-radius: 24px;
              z-index: 10;
              pointer-events: none;
        }

        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            pointer-events: none;
            text-align: center;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(107, 203, 222, 0.04) 0%, rgba(0,0,0,0) 40%);
        }
        .logo-text {
            font-size: 10rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -3px;
            line-height: 1;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 80px rgba(255, 255, 255, 0.1);
        }

        .top-nav {
            position: absolute;
            top: 4vh;
            left: 5vw;
            right: 5vw;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            pointer-events: auto;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 48px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .nav-links a {
            color: #E2E8F0;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.2s, text-shadow 0.2s;
            cursor: pointer;
        }
        .nav-links a:hover { color: #FFF; text-shadow: 0 0 10px rgba(255,255,255,0.4); }

        .nav-btn {
            position: absolute;
            right: 0;
            background: linear-gradient(135deg, #6BCBDE, #54B4D3);
            color: #000000;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 12px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(107, 203, 222, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(107, 203, 222, 0.4); }

        .stats {
            position: absolute;
            bottom: calc(10vh + 32px);
            right: calc(5vw + 32px);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 28px;
            border-radius: 8px;
            text-align: right;
            pointer-events: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 30;
        }
        .stats-label { font-size: 11px; color: #A0A5B0; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; font-weight: 700; }
        .stats-value { font-size: 34px; font-weight: 500; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; transition: color 0.2s; letter-spacing: 0.5px; }

        .instruction {
            position: absolute;
            bottom: calc(10vh + 32px);
            left: calc(5vw + 32px);
            color: #787B86;
            font-size: 13px;
            pointer-events: none;
            transition: opacity 0.5s;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 30;
        }

        /* ------------- BLOOMBERG UI SECTION ------------- */
        .bbg-ui {
            width: 100%; height: 100%;
            background: #FFFFFF;
            color: #000000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .bbg-topbar { background: #000; color: #fff; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        .bbg-logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .bbg-top-links { display: flex; gap: 20px; font-size: 14px; font-weight: bold; }
        .bbg-btn-white { background: #fff; color: #000; padding: 6px 16px; border-radius: 4px; border: none; font-weight: bold; font-size: 13px;}
        
        .bbg-ticker-strip { background: #222; color: #fff; padding: 10px 40px; display: flex; gap: 16px; font-size: 12px; font-weight: bold; overflow: hidden; align-items: center;}
        .bbg-ticker-item { background: #111; padding: 6px 12px; border-radius: 4px; display: flex; gap: 8px; border: 1px solid #333;}
        .bbg-red { color: #ff4a4a; }
        .bbg-green { color: #00e676; }

        .bbg-nav { border-bottom: 1px solid #e5e5e5; padding: 30px 40px 15px 40px; }
        .bbg-nav h1 { font-size: 56px; margin: 0 0 20px 0; font-weight: 800; letter-spacing: -1px; }
        .bbg-nav-links { display: flex; gap: 24px; font-size: 15px; color: #333; }
        
        .bbg-content { display: flex; padding: 30px 40px; gap: 40px; flex: 1; }
        .bbg-main { flex: 2; border-right: 1px solid #e5e5e5; padding-right: 40px; }
        .bbg-hero-img { width: 100%; height: 340px; background: url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&q=80') center/cover; margin-bottom: 15px; }
        .bbg-headline { font-size: 42px; font-weight: 800; line-height: 1.1; margin: 10px 0; letter-spacing: -1px;}
        .bbg-subhead { font-size: 14px; color: #666; margin: 0; }
        
        .bbg-side { flex: 1; display: flex; flex-direction: column; gap: 30px;}
        .bbg-side-news { font-size: 18px; font-weight: 700; line-height: 1.3; border-bottom: 1px solid #e5e5e5; padding-bottom: 15px; }
        .bbg-newsletter { background: #f9f9f9; padding: 20px; border: 1px solid #e5e5e5; border-top: 4px solid #4169e1; }
        .bbg-newsletter h3 { margin: 0 0 10px 0; font-size: 18px; font-weight: 800;}
        .bbg-newsletter p { font-size: 13px; color: #555; line-height: 1.5; margin: 0 0 15px 0;}
        .bbg-newsletter button { background: #000; color: #fff; padding: 10px 20px; width: 100%; border: none; font-weight: bold; border-radius: 20px; }

        /* ------------- WALFORD OS UI SECTION ------------- */
        .wos-ui {
            width: 100%; height: 100%;
            background: #000000;
            color: #D1D4DC;
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
        }
        .wos-sidebar {
            width: 260px;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
            background: #000000;
        }
        .wos-logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px;}
        .wos-nav-item { font-size: 14px; color: #8A92A6; cursor: pointer; padding: 12px 16px; border-radius: 8px; transition: 0.2s;}
        .wos-nav-item:hover, .wos-nav-item.active { background: rgba(255,255,255,0.05); color: #fff; }
        
        .wos-main { flex: 1; display: flex; flex-direction: column; padding: 40px 60px; }
        .wos-topbar { display: flex; gap: 80px; margin-bottom: 50px; }
        .wos-stat-box { display: flex; flex-direction: column; gap: 8px; }
        .wos-stat-label { font-size: 11px; color: #787B86; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;}
        .wos-stat-val { font-size: 24px; font-weight: 600; color: #fff; font-family: 'SF Pro Display', sans-serif; }
        .wos-val-red { color: #E24B46; }
        .wos-val-green { color: #52B974; }

        .wos-header h2 { font-size: 32px; font-weight: 300; color: #fff; margin: 0 0 10px 0; letter-spacing: 1px;}
        .wos-header p { font-size: 12px; color: #8A92A6; letter-spacing: 2px; margin: 0 0 40px 0; text-transform: uppercase; }

        .wos-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        
        .wos-card { background: #0A0A0A; border-radius: 16px; border: 1px solid rgba(255,255,255,0.04); padding: 30px; }
        .wos-card-title { font-size: 13px; color: #fff; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px;}
        .wos-card-title::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #6BCBDE; }
        
        .wos-snapshot-stats { display: flex; justify-content: space-between; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .wos-tickers-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .wos-ticker-col h4 { font-size: 11px; color: #787B86; letter-spacing: 1px; margin: 0 0 15px 0; font-weight: 600;}
        .wos-ticker-row { background: #111111; border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.02); transition: 0.2s;}
        .wos-ticker-row:hover { background: #1A1A1A; border-color: rgba(255,255,255,0.1);}
        .wos-ticker-name { font-weight: 700; color: #E2E8F0; font-size: 14px;}
        .wos-ticker-price { font-size: 14px; color: #8A92A6; display: flex; gap: 15px;}

        .wos-alert-box { background: rgba(255,255,255,0.02); border-radius: 10px; padding: 20px; border: 1px dashed rgba(255,255,255,0.1); margin-top: 10px;}
        .wos-alert-title { font-size: 14px; font-weight: 700; color: #fff; margin: 0 0 8px 0; display: flex; align-items: center; gap: 8px;}
        .wos-alert-title::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #8A92A6; }
        .wos-alert-desc { font-size: 13px; color: #8A92A6; margin: 0; line-height: 1.5;}

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const NUM_BARS = 150;

        // Shared Data for synchronization between transitions
        const MARKET_DATA = {
            portfolioValue: "214,703",
            dailyPnL: "- 2,252.10",
            totalReturn: "- 17.75%",
            holdings: 10,
            nifty: "23,775",

                { name: "TCS", price: "₹2589.00", pct: "+1.16%" },

            ],

                { name: "ICICIBANK", price: "₹1281.30", pct: "-2.13%" },
                { name: "SBIN", price: "₹1040.95", pct: "-1.93%" }
            ]
        };

        // --- Bloomberg MOCK UI Component ---
        function BloombergUI({ data }) {
            return (
                <div className="bbg-ui">
                    <div className="bbg-topbar">
                        <div className="bbg-logo">Bloomberg</div>

                        <div style={{marginLeft: 'auto', display: 'flex', gap: '10px'}}>
                            <div className="bbg-ticker-item">
                                <span>S&P 500</span> <span>7,399.31</span> <span className="bbg-red">▼ 0.98%</span>
                            </div>
                            <div className="bbg-ticker-item">
                                <span>Nasdaq</span> <span>25,733.64</span> <span className="bbg-red">▼ 1.65%</span>
                            </div>
                            <div className="bbg-ticker-item">
                                <span>{data.gainers[0].name}</span> <span>{data.gainers[0].price}</span> <span className="bbg-green">▲ {data.gainers[0].pct}</span>
                            </div>
                        </div>
                    </div>
                    <div className="bbg-nav">

                    </div>
                    <div className="bbg-content">
                        <div className="bbg-main">

                                <p>What's happening in stocks, bonds, currencies and commodities right now — and what will move them next.</p>
                                <button>Subscribe</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- WalfordOS MOCK UI Component ---
        function WalfordOSUI({ data }) {
            return (
                <div className="wos-ui">
                    <div className="wos-sidebar">
                        <div className="wos-logo">CORE — Walford OS</div>
                        <div className="wos-nav-item">Home</div>
                        <div className="wos-nav-item active">Portfolio</div>
                        <div className="wos-nav-item">Research</div>

        // --- Original Interactive Graph adapted as Hero Transition Section ---
        function HeroTransitionSection() {
            const sectionRef = useRef(null);
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                const handleScroll = () => {
                    if (!sectionRef.current) return;
                    const rect = sectionRef.current.getBoundingClientRect();
                    const scrollDistance = rect.height - window.innerHeight;
                    let currentProgress = -rect.top / scrollDistance;
                    currentProgress = Math.max(0, Math.min(1, currentProgress));
                    setProgress(currentProgress);
                };
                window.addEventListener('scroll', handleScroll);
                handleScroll();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const canvasRef = useRef(null);
            const [netTotal, setNetTotal] = useState(0);
            const valuesRef = useRef(new Array(NUM_BARS).fill(0));
            const timerRef = useRef(null);
            const animRef = useRef(null);
            const lastPosRef = useRef({ x: null, y: null });
            
            const staticNoise = useMemo(() => Array.from({length: NUM_BARS}, () => Math.random() * 0.3 + 0.85), []);
            
            const isDrawingRef = useRef(false);
            const zigZagRef = useRef(null);
            const [interacted, setInteracted] = useState(false);

            const draw = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const baseline = height / 2;
                const barWidth = width / NUM_BARS;

                ctx.clearRect(0, 0, width, height);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let x = 0; x <= width; x += 80) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
                for (let y = 0; y <= height; y += 80) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, baseline); ctx.lineTo(width, baseline);
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(107, 203, 222, 0.7)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < NUM_BARS; i++) {
                    let sum = 0, count = 0;
                    for (let j = Math.max(0, i - 5); j <= i; j++) { sum += valuesRef.current[j]; count++; }
                    const y = baseline - (sum / count);
                    const x = i * barWidth + barWidth/2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(160, 165, 176, 0.4)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < NUM_BARS; i++) {
                    let sum = 0, count = 0;
                    for (let j = Math.max(0, i - 15); j <= i; j++) { sum += valuesRef.current[j]; count++; }
                    const y = baseline - (sum / count);
                    const x = i * barWidth + barWidth/2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                const MIN_BODY = 2; 

                for (let i = 0; i < NUM_BARS; i++) {
                    const closeVal = valuesRef.current[i];
                    const openVal = i > 0 ? valuesRef.current[i-1] : closeVal;
                    
                    if (Math.abs(closeVal) < 0.5 && Math.abs(openVal) < 0.5) continue;
                    
                    const x = i * barWidth;
                    const bodyWidth = Math.max(2, barWidth * 0.5); 
                    const bodyX = x + (barWidth - bodyWidth) / 2;

                    const isGreen = closeVal >= openVal;
                    const color = isGreen ? '#52B974' : '#E24B46';
                    
                    const yOpen = baseline - openVal;
                    const yClose = baseline - closeVal;
                    
                    const topY = Math.min(yOpen, yClose);
                    const bottomY = Math.max(yOpen, yClose);
                    const bodyHeight = Math.max(MIN_BODY, bottomY - topY);

                    const noiseVal = staticNoise[i]; 
                    const wickTopExtension = (noiseVal * 40) % 20;
                    const wickBottomExtension = (noiseVal * 80) % 20;

                    const wickHigh = topY - wickTopExtension;
                    const wickLow = bottomY + wickBottomExtension;

                    ctx.strokeStyle = color;
                    ctx.lineWidth = Math.max(1, bodyWidth * 0.15);
                    ctx.beginPath();
                    ctx.moveTo(x + barWidth/2, wickHigh); ctx.lineTo(x + barWidth/2, wickLow);
                    ctx.stroke();

                    ctx.fillStyle = color;
                    ctx.fillRect(bodyX, topY, bodyWidth, bodyHeight);
                }
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const updateSize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight; // Still 100vh perfectly
                    draw();
                };
                window.addEventListener('resize', updateSize);
                updateSize();
                return () => window.removeEventListener('resize', updateSize);
            }, []);

            const handleMouseMove = (e) => {
                if (!interacted) setInteracted(true);
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                // Get mouse pos relative to canvas to support scrolling correctly
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const baseline = canvas.height / 2;

                if (animRef.current) { clearInterval(animRef.current); animRef.current = null; }

                const targetY = baseline - mouseY;

                if (!isDrawingRef.current) {
                    isDrawingRef.current = true;
                    zigZagRef.current = { anchors: [{ x: mouseX, y: targetY }], currentPeak: { x: mouseX, y: targetY }, isLookingForHigh: targetY >= 0 };
                    lastPosRef.current = { x: mouseX, y: mouseY };
                    return;
                }

                const lastX = lastPosRef.current.x;

                if (lastX !== null && mouseX < lastX) { lastPosRef.current = { x: mouseX, y: mouseY }; return; }

                let zz = zigZagRef.current;
                let lastAnchor = zz.anchors[zz.anchors.length - 1];
                const THRESHOLD = (canvas.height / 2) * 0.08; 

                if (zz.isLookingForHigh) {
                    if (targetY > zz.currentPeak.y) zz.currentPeak = { x: mouseX, y: targetY };
                    else if (zz.currentPeak.y - targetY > THRESHOLD) {
                        zz.anchors.push(zz.currentPeak); lastAnchor = zz.currentPeak; zz.isLookingForHigh = false; zz.currentPeak = { x: mouseX, y: targetY };
                    }
                } else {
                    if (targetY < zz.currentPeak.y) zz.currentPeak = { x: mouseX, y: targetY };
                    else if (targetY - zz.currentPeak.y > THRESHOLD) {
                        zz.anchors.push(zz.currentPeak); lastAnchor = zz.currentPeak; zz.isLookingForHigh = true; zz.currentPeak = { x: mouseX, y: targetY };
                    }
                }

                const drawSegment = (start, end) => {
                    const startBar = Math.max(0, Math.floor((start.x / canvas.width) * NUM_BARS));
                    const endBar = Math.min(NUM_BARS - 1, Math.floor((end.x / canvas.width) * NUM_BARS));
                    if (endBar >= startBar) {
                        for (let i = startBar; i <= endBar; i++) {
                            const progress = startBar === endBar ? 1 : (i - startBar) / (endBar - startBar);
                            const exactY = start.y + (end.y - start.y) * progress;
                            if (Math.abs(exactY) > 2) valuesRef.current[i] = exactY * staticNoise[i];
                            else valuesRef.current[i] = exactY;
                        }
                    }
                };

                drawSegment(lastAnchor, zz.currentPeak);
                drawSegment(zz.currentPeak, { x: mouseX, y: targetY });

                lastPosRef.current = { x: mouseX, y: mouseY };
                
                const total = valuesRef.current.reduce((sum, val) => sum + val, 0);
                setNetTotal(total);
                draw();

                clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => {
                    animRef.current = setInterval(() => {
                        let allZero = true;
                        for (let i = 0; i < NUM_BARS; i++) {
                            if (Math.abs(valuesRef.current[i]) < 1) valuesRef.current[i] = 0;
                            else { valuesRef.current[i] *= 0.92; allZero = false; }
                        }
                        const newTotal = valuesRef.current.reduce((sum, val) => sum + val, 0);
                        setNetTotal(newTotal); draw();
                        if (allZero) { clearInterval(animRef.current); animRef.current = null; isDrawingRef.current = false; zigZagRef.current = null; }
                    }, 16);
                }, 800); 
            };

            const handleMouseLeave = () => lastPosRef.current = { x: null, y: null };

            const sign = netTotal >= 0 ? '+' : '-';
            const displayValue = Math.abs(Math.round(netTotal * 5));
            const color = netTotal >= 0 ? '#52B974' : '#E24B46';

            // Animation values based on progress
            const graphScale = 1 - (progress * 0.8); // zoom out from 1 to 0.2
            const graphOpacity = Math.max(0, 1 - (progress * 2)); // Smooth crossfade over scrolling
            const quickFadeOpacity = Math.max(0, 1 - (progress * 20)); // Instantly fade out UI text elements

            const growingGraphPointsArray = useMemo(() => {
                const keyframes = [
                    {x: 0, y: 90},
                    {x: 15, y: 70},
                    {x: 30, y: 40}, // Peak 1
                    {x: 40, y: 65}, // Valley 1
                    {x: 50, y: 55},
                    {x: 60, y: 75}, // Valley 2
                    {x: 70, y: 20}, // Peak 2 (Massive)
                    {x: 85, y: 60}, // Valley 3
                    {x: 100, y: 5}  // Final Top
                ];
                let pts = [];
                for (let x = 0; x <= 100; x += 1) {
                    let i = 0;
                    while (i < keyframes.length - 1 && keyframes[i+1].x < x) i++;
                    let p1 = keyframes[i];
                    let p2 = keyframes[i+1] || p1;
                    
                    let segmentProgress = (x - p1.x) / (p2.x - p1.x || 1);
                    // Smooth easing for a beautiful curve
                    let ease = 0.5 - Math.cos(segmentProgress * Math.PI) / 2;
                    let y = p1.y + (p2.y - p1.y) * ease;
                    
                    // Micro-noise for organic feel
                    y += (Math.random() - 0.5) * 4;
                    pts.push({x, y});
                }
                return pts;
            }, []);
            const growingGraphPoints = growingGraphPointsArray.map(p => `${p.x},${p.y}`).join(' ');

            // Complex Piecewise Narrative Logic
            let graphDrawProgress = 0;
            if (progress <= 0.1) {
                graphDrawProgress = 0;
            } else if (progress <= 0.25) {
                // Grow 1
                graphDrawProgress = ((progress - 0.1) / 0.15) * 0.3;
            } else if (progress <= 0.45) {
                // Pause 1
                graphDrawProgress = 0.3;
            } else if (progress <= 0.6) {
                // Grow 2
                graphDrawProgress = 0.3 + ((progress - 0.45) / 0.15) * 0.4;
            } else if (progress <= 0.85) {
                // Pause 2
                graphDrawProgress = 0.7;
            } else {
                // Final Spike
                graphDrawProgress = 0.7 + ((progress - 0.85) / 0.15) * 0.3;
            }
            
            const tipX = graphDrawProgress * 100;
            let tipY = 0;
            let tipAngle = 0;
            let activeGraphPointsString = "";

            if (growingGraphPointsArray.length > 0) {
                const floorX = Math.floor(tipX);
                const ceilX = Math.ceil(tipX);
                if (floorX === ceilX) {
                    tipY = growingGraphPointsArray[floorX]?.y || 0;
                } else {
                    const p1 = growingGraphPointsArray[floorX];
                    const p2 = growingGraphPointsArray[ceilX];
                    if (p1 && p2) {
                        tipY = p1.y + (p2.y - p1.y) * (tipX - floorX);
                    }
                }

                // Generate active path string sliced exactly at tipX
                const activePoints = growingGraphPointsArray.filter(p => p.x <= tipX);
                if (activePoints.length > 0 && activePoints[activePoints.length - 1].x !== tipX) {
                    activePoints.push({ x: tipX, y: tipY });
                }
                activeGraphPointsString = activePoints.map(p => `${p.x},${p.y}`).join(' ');

                // Calculate exact tangent angle of the curve at this X-coordinate
                const angleFloor = Math.max(0, Math.floor(tipX) - 1);
                const angleCeil = Math.min(100, Math.ceil(tipX) + 1);
                const p1 = growingGraphPointsArray[angleFloor];
                const p2 = growingGraphPointsArray[angleCeil];
                if (p1 && p2 && p2.x !== p1.x) {
                    // Adjust dx/dy to physical screen pixels so angle is visually correct
                    const dx = (p2.x - p1.x) * (window.innerWidth / 100);
                    const dy = (p2.y - p1.y) * (window.innerHeight / 100);
                    tipAngle = Math.atan2(dy, dx) * (180 / Math.PI);
                }
            }

            // Cinematic Zoom, Pan & Dim Logic
            let graphDynamicScale = 1.0;
            let graphDynamicOpacity = 1.0;
            let graphTranslateX = 0;
            let graphTranslateY = 0;
            
            let text1Opacity = 0;
            let text2Opacity = 0;

            const peak1X = 30;
            const peak1Y = growingGraphPointsArray[30].y;
            const peak2X = 70;
            const peak2Y = growingGraphPointsArray[70].y;

            // Pause 1 zoom & text (Peak at 30%)
            if (progress > 0.25 && progress < 0.45) {
                let p = 0;
                if (progress < 0.3) {
                    p = (progress - 0.25) / 0.05;
                    text1Opacity = p; 
                } else if (progress < 0.4) {
                    p = 1;
                    text1Opacity = 1;
                } else {
                    p = 1 - ((progress - 0.4) / 0.05);
                    text1Opacity = p; 
                }
                
                graphDynamicScale = 1.0 + (p * 0.6); // Zoom to 1.6
                graphDynamicOpacity = 1.0 - (p * 0.7); // Dim to 0.3
                
                // Pan camera to move peak to the absolute center (50, 50)
                graphTranslateX = (50 - peak1X) * 1.6 * p;
                graphTranslateY = (50 - peak1Y) * 1.6 * p;
            }

            // Pause 2 zoom & text (Peak at 70%)
            if (progress > 0.6 && progress < 0.85) {
                let p = 0;
                if (progress < 0.65) {
                    p = (progress - 0.6) / 0.05;
                    text2Opacity = p;
                } else if (progress < 0.8) {
                    p = 1;
                    text2Opacity = 1;
                } else {
                    p = 1 - ((progress - 0.8) / 0.05);
                    text2Opacity = p;
                }

                graphDynamicScale = 1.0 + (p * 0.6);
                graphDynamicOpacity = 1.0 - (p * 0.7);
                
                // Pan camera to move peak to the absolute center (50, 50)
                graphTranslateX = (50 - peak2X) * 1.6 * p;
                graphTranslateY = (50 - peak2Y) * 1.6 * p;
            }

            // Calculate the exact screen coordinates of the peaks as they pan and zoom
            const screenPeak1X = 50 + (peak1X - 50) * graphDynamicScale + graphTranslateX;
            const screenPeak1Y = 50 + (peak1Y - 50) * graphDynamicScale + graphTranslateY;

            const screenPeak2X = 50 + (peak2X - 50) * graphDynamicScale + graphTranslateX;
            const screenPeak2Y = 50 + (peak2Y - 50) * graphDynamicScale + graphTranslateY;

            const tickerRows = useMemo(() => {
                const baseSymbols = [
                    'S&P 500', 'Nasdaq', 'B500', 'US 10 Yr', 'Crude Oil', 'Gold', 'BTC/USD', 'EUR/USD', 'NIFTY 50', 'VIX',
                    'FTSE 100', 'DAX', 'Nikkei 225', 'Hang Seng', 'Shanghai', 'ASX 200', 'TSX', 'CAC 40', 'Euro Stoxx 50', 'Russell 2000',
                    'Silver', 'Copper', 'Natural Gas', 'Wheat', 'Corn', 'Soybeans', 'Coffee', 'Sugar', 'Cotton', 'Cocoa',
                    'USD/JPY', 'GBP/USD', 'USD/CHF', 'AUD/USD', 'USD/CAD', 'NZD/USD', 'EUR/GBP', 'EUR/JPY', 'GBP/JPY', 'ETH/USD'
                ];
                const currencies = ['₹', '$', '€', '£'];
                
                const generateItems = () => {
                    const shuffled = [...baseSymbols].sort(() => Math.random() - 0.5);
                    return shuffled.map((name, i) => ({
                        name,
                        val: (Math.random() * 10000 + 1000).toFixed(2),
                        pct: (Math.random() * 2).toFixed(2),
                        isDown: i % 2 === 0,
                        currency: currencies[Math.floor(Math.random() * currencies.length)]
                    }));
                };

                const rows = [];
                const numRows = 8; // Dense 8 rows
                const positions = ['8%', '20%', '32%', '44%', '56%', '68%', '80%', '92%'];
                
                for (let i = 0; i < numRows; i++) {
                    const dir = i % 2 === 0 ? -1 : 1;
                    const items = generateItems();
                    
                    rows.push({
                        top: positions[i],
                        dir,
                        // Duplicate array to allow seamless 50% translation loop
                        items: [...items, ...items]
                    });
                }
                
                return rows;
            }, []);

            return (
                <div ref={sectionRef} style={{ height: '250vh', position: 'relative' }}>
                    <div style={{
                        position: 'sticky',
                        top: 0,
                        height: '100vh',
                        overflow: 'hidden',
                        backgroundColor: '#000',
                        pointerEvents: progress > 0.8 ? 'none' : 'auto'
                    }}>
                        {/* Interactive Graph Layer */}
                        <div style={{
                            width: '100%', height: '100%',
                            transform: `scale(${graphScale})`,
                            transformOrigin: 'center center',
                            opacity: graphOpacity,
                            willChange: 'transform, opacity',
                            pointerEvents: progress > 0.05 ? 'none' : 'auto'
                        }}>
                            <div className="hero-section" style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: '100%' }}>
                                <div className="map-bg"></div>
                                <canvas className="hero-canvas" ref={canvasRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} />
                                
                                <div className="blur-overlay"></div>
                                <div className="center-boundary"></div>

                                <div className="logo-container" style={{ opacity: quickFadeOpacity }}>
                                    <div className="logo-text">WalfordOS</div>
                                </div>
                                
                                <header className="top-nav" style={{ opacity: quickFadeOpacity }}>
                                    <div className="nav-links">
                                        <a>ABOUT US</a>
                                        <a>DASHBOARD</a>
                                        <a>FEATURES</a>
                                        <a>FINANCIAL MODELS</a>
                                        <a>CONTACT</a>
                                    </div>
                                    <button className="nav-btn">Get Started</button>
                                </header>
                                
                                <div className="stats" style={{ opacity: quickFadeOpacity }}>
                                    <div className="stats-label">Net Unrealized P&L</div>
                                    <div className="stats-value" style={{ color: color }}>{sign}${displayValue.toLocaleString()}</div>
                                </div>

                                {!interacted && (
                                    <div className="instruction" style={{ opacity: quickFadeOpacity }}>Draw the market dynamically with your cursor</div>
                                )}
                            </div>
                        </div>

                        {/* Background Continuous Ticker Bars */}
                        {tickerRows.map((row, index) => {
                            // Fade in at the very start as hero zooms out
                            const rowOpacity = Math.min(0.15, progress * 1.5);
                            
                            const animName = row.dir === -1 ? 'sweepLeft' : 'sweepRight';
                            const animDuration = 30 + (index % 4) * 10; // Variable speeds: 30s, 40s, 50s, 60s

                            return (
                                <div className="ticker-bar" key={index} style={{ 
                                    top: row.top,
                                    animation: `${animName} ${animDuration}s linear infinite`,
                                    opacity: rowOpacity
                                }}>
                                    {row.items.map((item, i) => (
                                        <React.Fragment key={i}>
                                            <div className="ticker-pill">
                                                <span>{item.name}</span>
                                                <span className="ticker-pill-val">{item.val}</span>
                                                <span style={{ color: item.isDown ? '#ff4a4a' : '#66BB6A' }}>
                                                    {item.isDown ? '▼' : '▲'} {item.pct}%
                                                </span>
                                            </div>
                                            <div className="currency-symbol">{item.currency}</div>
                                        </React.Fragment>
                                    ))}
                                </div>
                            );
                        })}

                        {/* Foreground Growing Graph */}
                        <div style={{ 
                            position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', 
                            pointerEvents: 'none', zIndex: 5,
                            transform: `translate(${graphTranslateX}%, ${graphTranslateY}%) scale(${graphDynamicScale})`,
                            transformOrigin: 'center center',
                            opacity: graphDynamicOpacity,
                            willChange: 'transform, opacity'
                        }}>
                            <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: '100%', height: '100%' }}>
                                <g>
                                    {/* Outer Glow */}
                                    <polyline 
                                        points={activeGraphPointsString} 
                                        fill="none" 
                                        stroke="#66BB6A" 
                                        strokeWidth="1"
                                        opacity="0.05"
                                        filter="blur(1px)"
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                    {/* Inner Glow */}
                                    <polyline 
                                        points={activeGraphPointsString} 
                                        fill="none" 
                                        stroke="#66BB6A" 
                                        strokeWidth="0.8"
                                        opacity="0.15"
                                        filter="blur(1.5px)"
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                    
                                    {/* Main Sharp Line */}
                                    <polyline 
                                        points={activeGraphPointsString} 
                                        fill="none" 
                                        stroke="#66BB6A" 
                                        strokeWidth="0.8"
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                </g>
                            </svg>

                            {/* Simple Path Pointer */}
                            {graphDrawProgress > 0 && graphDrawProgress < 1 && (
                                <div style={{
                                    position: 'absolute',
                                    left: `${tipX}%`,
                                    top: `${tipY}%`,
                                    width: '8px',
                                    height: '8px',
                                    backgroundColor: '#FFF',
                                    borderRadius: '50%',
                                    transform: 'translate(-50%, -50%)',
                                    boxShadow: '0 0 15px 5px rgba(102, 187, 106, 0.4), 0 0 8px 2px rgba(102, 187, 106, 0.8)',
                                    zIndex: 10
                                    /* CRITICAL: No CSS transition! This ensures the dot instantly tracks the path without lagging or 'teleporting' when scrolling fast. */
                                }} />
                            )}
                        </div>

                        {/* Story Text Checkpoint 1 (Anchored above the panning Peak 1) */}
                        <div style={{
                            position: 'absolute', top: `${screenPeak1Y}%`, left: `${screenPeak1X}%`, 
                            transform: `translate(-50%, -100%) translateY(-30px)`,
                            opacity: text1Opacity, pointerEvents: 'none', zIndex: 10,
                            willChange: 'opacity, top, left'
                        }}>
                            <div style={{ textAlign: 'center', width: '800px', transform: `translateY(${20 - text1Opacity*20}px)`, transition: 'transform 0.1s' }}>
                                <div style={{ color: 'rgba(255,255,255,0.7)', fontSize: '0.9rem', letterSpacing: '2px', textTransform: 'uppercase', marginBottom: '20px', fontWeight: 600 }}>AI-Powered Equity Research</div>
                                <h1 style={{ fontSize: '4.5rem', fontWeight: 'bold', lineHeight: '1.1', margin: '0 0 30px 0', color: 'white' }}>
                                    One Dashboard.<br/>
                                    Replace Everything.
                                </h1>
                                <p style={{ color: 'white', fontSize: '1.2rem' }}>Replace 6 screens, multiple tools, and 2 interns with one powerful AI</p>
                            </div>
                        </div>

                        {/* Story Text Checkpoint 2 (Anchored above the panning Peak 2) */}
                        <div style={{
                            position: 'absolute', top: `${screenPeak2Y}%`, left: `${screenPeak2X}%`, 
                            transform: `translate(-50%, -100%) translateY(-30px)`,
                            opacity: text2Opacity, pointerEvents: 'none', zIndex: 10,
                            willChange: 'opacity, top, left'
                        }}>
                            <div style={{ textAlign: 'center', width: '800px', transform: `translateY(${20 - text2Opacity*20}px)`, transition: 'transform 0.1s' }}>
                                <div style={{ color: 'rgba(255,255,255,0.7)', fontSize: '0.9rem', letterSpacing: '2px', textTransform: 'uppercase', marginBottom: '20px', fontWeight: 600 }}>What We Built</div>
                                <h2 style={{ color: 'white', fontSize: '3.5rem', fontWeight: 'bold', lineHeight: '1.1', margin: '0 0 30px 0' }}>
                                    One platform that replaces everything.
                                </h2>
                                <p style={{ color: 'white', fontSize: '1.1rem', lineHeight: '1.6', marginBottom: '40px' }}>
                                    Walford OS consolidates portfolio tracking, quantitative research, risk management and market intelligence into a single AI-powered dashboard. No more switching between tools, tabs and interns.
                                </p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '15px', alignItems: 'center' }}>
                                    <div style={{ color: 'white', fontSize: '1.1rem' }}>Real-time portfolio snapshot with live P&L tracking</div>
                                    <div style={{ color: 'white', fontSize: '1.1rem' }}>AI-powered research across 500+ instruments</div>
                                    <div style={{ color: 'white', fontSize: '1.1rem' }}>Institutional-grade risk metrics at a glance</div>
                                    <div style={{ color: 'white', fontSize: '1.1rem' }}>Built for equity research analysts and PMS managers</div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // --- Main App Composer ---
        function App() {
            return (
                <div style={{ backgroundColor: '#000', fontFamily: 'Inter, sans-serif' }}>
                    <HeroTransitionSection />
                    <ScrollTransitionSection />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
